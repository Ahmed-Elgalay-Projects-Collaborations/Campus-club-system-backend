name: backend-deploy-azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
      TEST_MONGO_URI: mongodb://127.0.0.1:27017/campus_club_test
      TEST_DB_NAME: campus_club_test
      DISABLE_RATE_LIMIT: true
      ENABLE_DEFAULT_ADMIN_SEED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run functional tests
        run: npm run test:functional

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
      WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      IMAGE_NAME: campus-club-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push Docker image
        run: |
          IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_NAME:${GITHUB_SHA}"
          IMAGE_LATEST="$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Deploy image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
