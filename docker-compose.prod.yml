services:
  backend:
    build:
      context: .
      target: production
    command: node src/server.js
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONOLITHIC_MODE: "true"
      PORT: 4000
      MONOLITH_PORT: 4000
    ports:
      - "${PORT:-4000}:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
